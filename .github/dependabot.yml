version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      safe-npm-updates:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
      timezone: Europe/Amsterdam
    groups:
      github-actions:
        patterns:
          - "*"
