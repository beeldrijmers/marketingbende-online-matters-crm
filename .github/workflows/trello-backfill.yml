name: 🔁 Trello backfill

# Full Trello reconciliation in addition to live webhooks. The schedule repairs
# missed/delayed webhook events and re-applies authoritative stage/list mapping.
on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

concurrency:
  group: trello-full-reconciliation
  cancel-in-progress: false

jobs:
  backfill:
    name: 🔁 Trigger backfill
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      ADMIN_BACKFILL_SECRET: ${{ secrets.ADMIN_BACKFILL_SECRET }}

    steps:
      - name: 🔁 POST backfill trigger
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$ADMIN_BACKFILL_SECRET" ]; then
            echo "::error::Missing SUPABASE_URL or ADMIN_BACKFILL_SECRET secret"
            exit 1
          fi
          endpoint="${SUPABASE_URL%/}/functions/v1/trello-sync"
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            run_kind="scheduled"
          else
            run_kind="backfill"
          fi
          echo "POST $endpoint"
          http_code=$(curl -sS --max-time 600 -o /tmp/backfill-response.json -w "%{http_code}" \
            -X POST "$endpoint" \
            -H "x-admin-backfill-secret: ${ADMIN_BACKFILL_SECRET}" \
            -H "x-run-kind: ${run_kind}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $http_code"
          echo "----- response body -----"
          cat /tmp/backfill-response.json || true
          echo ""
          echo "-------------------------"
          if [ "$http_code" != "200" ]; then
            echo "::error::Backfill returned HTTP $http_code"
            exit 1
          fi
