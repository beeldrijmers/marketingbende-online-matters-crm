name: 🚀 Deploy
on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    pages: write
    contents: write

jobs:
    deploy-supabase:
        name: 🚀 Deploy
        runs-on: ubuntu-latest
        timeout-minutes: 10

        env:
            SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
            SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
            SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
            VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
            VITE_SB_PUBLISHABLE_KEY: ${{ secrets.SB_PUBLISHABLE_KEY }}
            IS_SUPABASE_CONFIGURED: ${{ secrets.SUPABASE_ACCESS_TOKEN && secrets.SUPABASE_DB_PASSWORD && secrets.SUPABASE_PROJECT_ID && secrets.SUPABASE_URL && secrets.SB_PUBLISHABLE_KEY }}
            VITE_INBOUND_EMAIL: ${{ vars.VITE_INBOUND_EMAIL }}
            VITE_ATTACHMENTS_BUCKET: ${{ vars.VITE_ATTACHMENTS_BUCKET || 'attachments' }}
            POSTMARK_WEBHOOK_USER: ${{secrets.POSTMARK_WEBHOOK_USER}}
            POSTMARK_WEBHOOK_PASSWORD: ${{secrets.POSTMARK_WEBHOOK_PASSWORD}}
            POSTMARK_WEBHOOK_AUTHORIZED_IPS: ${{secrets.POSTMARK_WEBHOOK_AUTHORIZED_IPS}}
            VITE_GOOGLE_WORKPLACE_DOMAIN: ${{secrets.VITE_GOOGLE_WORKPLACE_DOMAIN}}
            VITE_SENTRY_DSN: ${{secrets.VITE_SENTRY_DSN}}
            TRELLO_API_KEY: ${{secrets.TRELLO_API_KEY}}
            TRELLO_TOKEN: ${{secrets.TRELLO_TOKEN}}
            TRELLO_SYNC_DEFAULT_SALES_EMAIL: ${{secrets.TRELLO_SYNC_DEFAULT_SALES_EMAIL}}
            TRELLO_WEBHOOK_SHARED_SECRET: ${{secrets.TRELLO_WEBHOOK_SHARED_SECRET}}
            ADMIN_BACKFILL_SECRET: ${{secrets.ADMIN_BACKFILL_SECRET}}
            # Moneybird connections are per user (each user links their own
            # administration with a personal token); this key encrypts those
            # tokens at rest (AES-256-GCM, generated with: openssl rand -base64 32).
            MONEYBIRD_ENC_KEY: ${{secrets.MONEYBIRD_ENC_KEY}}
            GOOGLE_CLIENT_ID: ${{secrets.GOOGLE_CLIENT_ID}}
            GOOGLE_CLIENT_SECRET: ${{secrets.GOOGLE_CLIENT_SECRET}}
            GMAIL_ENC_KEY: ${{secrets.GMAIL_ENC_KEY}}
            GMAIL_SYNC_SECRET: ${{secrets.GMAIL_SYNC_SECRET}}
            CRM_SMOKE_EMAIL: ${{secrets.CRM_SMOKE_EMAIL}}
            CRM_SMOKE_PASSWORD: ${{secrets.CRM_SMOKE_PASSWORD}}
            RESEND_API_KEY: ${{secrets.RESEND_API_KEY}}
            RESEND_WEBHOOK_SECRET: ${{secrets.RESEND_WEBHOOK_SECRET}}

        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v6

            - name: ⚙️ Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: ⚙️ Setup git
              run: |
                  git remote set-url origin https://git:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}
                  git config --global user.email support+actions@github.com
                  git config --global user.name github-actions-bot

            - name: ⚙️ Setup supabase
              uses: supabase/setup-cli@v2

            - name: 📥 Download deps
              run: npm ci

            - name: 🔨 Build
              run: npm run build

            - if: ${{ env.IS_SUPABASE_CONFIGURED }}
              name: 🔗 Supabase Link
              run: npx supabase link --project-ref $SUPABASE_PROJECT_ID

            - if: ${{ env.IS_SUPABASE_CONFIGURED }}
              name: 🔐 Sync Supabase auth URL + email template config
              run: |
                  jq -n \
                      --arg site_url "https://crm.marketingbende.nl" \
                      --arg uri_allow_list "https://crm.marketingbende.nl/**,https://beeldrijmers.github.io/marketingbende-online-matters-crm/**" \
                      --arg invite_subject "You've been invited to Marketingbende x Online Matters CRM" \
                      --rawfile invite_content supabase/templates/invite.html \
                      --arg recovery_subject "Reset your Marketingbende x Online Matters CRM Password" \
                      --rawfile recovery_content supabase/templates/recovery.html \
                      '{
                          site_url: $site_url,
                          uri_allow_list: $uri_allow_list,
                          disable_signup: true,
                          password_min_length: 12,
                          password_hibp_enabled: true,
                          mailer_subjects_invite: $invite_subject,
                          mailer_templates_invite_content: $invite_content,
                          mailer_subjects_recovery: $recovery_subject,
                          mailer_templates_recovery_content: $recovery_content
                      }' > /tmp/auth-config.json
                  curl --fail-with-body -sS -X PATCH "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/config/auth" \
                      -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
                      -H "Content-Type: application/json" \
                      -d @/tmp/auth-config.json \
                      -w "\nHTTP status: %{http_code}\n"

            - if: ${{ env.IS_SUPABASE_CONFIGURED }}
              name: 📡 Push supabase migrations
              run: npx supabase db push

            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.POSTMARK_WEBHOOK_USER && env.POSTMARK_WEBHOOK_PASSWORD && env.POSTMARK_WEBHOOK_AUTHORIZED_IPS }}
              name: 📡 Push supabase postmark webhook user secret
              run: |
                  npx supabase secrets set POSTMARK_WEBHOOK_USER=${{ env.POSTMARK_WEBHOOK_USER }}
                  npx supabase secrets set POSTMARK_WEBHOOK_PASSWORD=${{ env.POSTMARK_WEBHOOK_PASSWORD }}
                  npx supabase secrets set POSTMARK_WEBHOOK_AUTHORIZED_IPS=${{ env.POSTMARK_WEBHOOK_AUTHORIZED_IPS }}

            # Inbound-email config is provider-agnostic (used by the Resend
            # inbound function too), so it must NOT be gated behind Postmark.
            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.VITE_INBOUND_EMAIL }}
              name: 📡 Push supabase inbound email config
              run: |
                  npx supabase secrets set VITE_INBOUND_EMAIL=${{ env.VITE_INBOUND_EMAIL }}
                  npx supabase secrets set VITE_ATTACHMENTS_BUCKET=${{ env.VITE_ATTACHMENTS_BUCKET }}

            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.TRELLO_API_KEY && env.TRELLO_TOKEN && env.TRELLO_SYNC_DEFAULT_SALES_EMAIL && env.TRELLO_WEBHOOK_SHARED_SECRET }}
              name: 📡 Push supabase trello sync secrets
              run: |
                  npx supabase secrets set TRELLO_API_KEY=${{ env.TRELLO_API_KEY }}
                  npx supabase secrets set TRELLO_TOKEN=${{ env.TRELLO_TOKEN }}
                  npx supabase secrets set TRELLO_SYNC_DEFAULT_SALES_EMAIL=${{ env.TRELLO_SYNC_DEFAULT_SALES_EMAIL }}
                  npx supabase secrets set TRELLO_WEBHOOK_SHARED_SECRET=${{ env.TRELLO_WEBHOOK_SHARED_SECRET }}

            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.ADMIN_BACKFILL_SECRET }}
              name: 📡 Push supabase admin backfill secret
              run: npx supabase secrets set ADMIN_BACKFILL_SECRET=${{ env.ADMIN_BACKFILL_SECRET }}

            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.MONEYBIRD_ENC_KEY }}
              name: 📡 Push supabase moneybird encryption key secret
              run: npx supabase secrets set MONEYBIRD_ENC_KEY=${{ env.MONEYBIRD_ENC_KEY }}

            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.GMAIL_ENC_KEY && env.GMAIL_SYNC_SECRET }}
              name: 📡 Push supabase Gmail encryption and sync secrets
              run: |
                  npx supabase secrets set GMAIL_ENC_KEY=${{ env.GMAIL_ENC_KEY }}
                  npx supabase secrets set GMAIL_SYNC_SECRET=${{ env.GMAIL_SYNC_SECRET }}

            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.GOOGLE_CLIENT_ID && env.GOOGLE_CLIENT_SECRET }}
              name: 📡 Push supabase Google OAuth client secrets
              run: |
                  npx supabase secrets set GOOGLE_CLIENT_ID=${{ env.GOOGLE_CLIENT_ID }}
                  npx supabase secrets set GOOGLE_CLIENT_SECRET=${{ env.GOOGLE_CLIENT_SECRET }}

            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.RESEND_API_KEY && env.RESEND_WEBHOOK_SECRET }}
              name: 📡 Push supabase resend inbound secrets
              run: |
                  npx supabase secrets set RESEND_API_KEY=${{ env.RESEND_API_KEY }}
                  npx supabase secrets set RESEND_WEBHOOK_SECRET=${{ env.RESEND_WEBHOOK_SECRET }}

            # UserMiddleware in the edge functions needs SB_PUBLISHABLE_KEY to call
            # auth.getUser(); without it every authenticated function returns 401.
            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.VITE_SB_PUBLISHABLE_KEY }}
              name: 📡 Push supabase publishable key secret
              run: npx supabase secrets set SB_PUBLISHABLE_KEY=${{ env.VITE_SB_PUBLISHABLE_KEY }}

            - if: ${{ env.IS_SUPABASE_CONFIGURED }}
              name: 📡 Deploy supabase functions
              run: npx supabase functions deploy

            # Keep a dedicated, non-admin account for the authenticated
            # production monitor. The service key is fetched ephemerally with
            # the already-scoped Supabase management token and is never logged
            # or persisted as a repository secret.
            - if: ${{ env.IS_SUPABASE_CONFIGURED && env.CRM_SMOKE_EMAIL && env.CRM_SMOKE_PASSWORD }}
              name: 🩺 Provision production smoke user
              run: |
                  api_keys=$(npx supabase projects api-keys \
                    --project-ref "$SUPABASE_PROJECT_ID" \
                    --reveal \
                    --output json)
                  service_role_key=$(printf '%s' "$api_keys" | jq -r \
                    '.[] | select(.name == "service_role") | .api_key' | head -n 1)
                  if [ -z "$service_role_key" ] || [ "$service_role_key" = "null" ]; then
                    echo "::error::Could not retrieve the Supabase service role key"
                    exit 1
                  fi

                  auth_url="${VITE_SUPABASE_URL%/}/auth/v1/admin/users"
                  curl --fail-with-body -sS "$auth_url?per_page=1000" \
                    -H "apikey: $service_role_key" \
                    -H "Authorization: Bearer $service_role_key" \
                    > /tmp/smoke-users.json
                  user_id=$(jq -r --arg email "$CRM_SMOKE_EMAIL" \
                    '.users[]? | select((.email | ascii_downcase) == ($email | ascii_downcase)) | .id' \
                    /tmp/smoke-users.json | head -n 1)

                  if [ -n "$user_id" ]; then
                    jq -n --arg password "$CRM_SMOKE_PASSWORD" \
                      '{password: $password, email_confirm: true, user_metadata: {first_name: "CRM", last_name: "Monitor"}}' \
                      > /tmp/smoke-user.json
                    curl --fail-with-body -sS -X PUT "$auth_url/$user_id" \
                      -H "apikey: $service_role_key" \
                      -H "Authorization: Bearer $service_role_key" \
                      -H "Content-Type: application/json" \
                      -d @/tmp/smoke-user.json > /dev/null
                    echo "Smoke monitor user updated"
                  else
                    jq -n --arg email "$CRM_SMOKE_EMAIL" --arg password "$CRM_SMOKE_PASSWORD" \
                      '{email: $email, password: $password, email_confirm: true, user_metadata: {first_name: "CRM", last_name: "Monitor"}}' \
                      > /tmp/smoke-user.json
                    curl --fail-with-body -sS -X POST "$auth_url" \
                      -H "apikey: $service_role_key" \
                      -H "Authorization: Bearer $service_role_key" \
                      -H "Content-Type: application/json" \
                      -d @/tmp/smoke-user.json > /dev/null
                    echo "Smoke monitor user created"
                  fi

                  rm -f /tmp/smoke-users.json /tmp/smoke-user.json

            - if: ${{ !env.SUPABASE_ACCESS_TOKEN }}
              name: Check SUPABASE_ACCESS_TOKEN secret
              run: echo ':warning:SUPABASE_ACCESS_TOKEN secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.SUPABASE_DB_PASSWORD }}
              name: Check SUPABASE_DB_PASSWORD secret
              run: echo ':warning:SUPABASE_DB_PASSWORD secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.SUPABASE_PROJECT_ID }}
              name: Check SUPABASE_PROJECT_ID secret
              run: echo ':warning:SUPABASE_PROJECT_ID secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.VITE_SUPABASE_URL }}
              name: Check SUPABASE_URL secret
              run: echo ':warning:SUPABASE_URL secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.VITE_SB_PUBLISHABLE_KEY }}
              name: Check SB_PUBLISHABLE_KEY secret
              run: echo ':warning:SB_PUBLISHABLE_KEY secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.POSTMARK_WEBHOOK_USER }}
              name: Check POSTMARK_WEBHOOK_USER secret
              run: echo ':warning:POSTMARK_WEBHOOK_USER secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.POSTMARK_WEBHOOK_PASSWORD }}
              name: Check POSTMARK_WEBHOOK_USER secret
              run: echo ':warning:POSTMARK_WEBHOOK_PASSWORD secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.POSTMARK_WEBHOOK_AUTHORIZED_IPS }}
              name: Check POSTMARK_WEBHOOK_USER secret
              run: echo ':warning:POSTMARK_WEBHOOK_AUTHORIZED_IPS secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.TRELLO_API_KEY }}
              name: Check TRELLO_API_KEY secret
              run: echo ':warning:TRELLO_API_KEY secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.TRELLO_TOKEN }}
              name: Check TRELLO_TOKEN secret
              run: echo ':warning:TRELLO_TOKEN secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.TRELLO_SYNC_DEFAULT_SALES_EMAIL }}
              name: Check TRELLO_SYNC_DEFAULT_SALES_EMAIL secret
              run: echo ':warning:TRELLO_SYNC_DEFAULT_SALES_EMAIL secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.TRELLO_WEBHOOK_SHARED_SECRET }}
              name: Check TRELLO_WEBHOOK_SHARED_SECRET secret
              run: echo ':warning:TRELLO_WEBHOOK_SHARED_SECRET secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.ADMIN_BACKFILL_SECRET }}
              name: Check ADMIN_BACKFILL_SECRET secret
              run: echo ':warning:ADMIN_BACKFILL_SECRET secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.MONEYBIRD_ENC_KEY }}
              name: Check MONEYBIRD_ENC_KEY secret
              run: echo ':warning:MONEYBIRD_ENC_KEY secret is missing' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.GOOGLE_CLIENT_ID || !env.GOOGLE_CLIENT_SECRET || !env.GMAIL_ENC_KEY || !env.GMAIL_SYNC_SECRET }}
              name: Check Gmail integration secrets
              run: echo ':warning:Gmail OAuth/sync secrets are incomplete' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.CRM_SMOKE_EMAIL || !env.CRM_SMOKE_PASSWORD }}
              name: Check production smoke credentials
              run: echo ':warning:Production smoke credentials are incomplete' >> $GITHUB_STEP_SUMMARY

            - if: ${{ !env.IS_SUPABASE_CONFIGURED }}
              name: Supabase deployment skipped
              run: echo ':warning:Supabase deployment skipped' >> $GITHUB_STEP_SUMMARY

            - name: 📡 Deploy GitHub pages
              run: npx gh-pages -d dist -b gh-pages
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
