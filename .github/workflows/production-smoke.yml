name: 🩺 Production smoke

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: 🩺 Authenticated CRM check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CRM_BASE_URL: https://crm.marketingbende.nl
      CRM_SMOKE_EMAIL: ${{ secrets.CRM_SMOKE_EMAIL }}
      CRM_SMOKE_PASSWORD: ${{ secrets.CRM_SMOKE_PASSWORD }}

    steps:
      - name: 🔐 Check monitor credentials
        run: |
          if [ -z "$CRM_SMOKE_EMAIL" ] || [ -z "$CRM_SMOKE_PASSWORD" ]; then
            echo "::error::CRM_SMOKE_EMAIL and CRM_SMOKE_PASSWORD are required; an unauthenticated skip is not a valid production check."
            exit 1
          fi

      - name: 📥 Checkout repo
        uses: actions/checkout@v6

      - name: ⚙️ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎭 Install Chromium
        run: npx playwright install chromium-headless-shell 1>/dev/null

      - name: 🩺 Check production
        run: npx playwright test --config playwright.production.config.ts

      - name: 📎 Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: production-smoke-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
