name: 🧹 Inbound cleanup (one-off)

# One-off, manually-dispatched maintenance workflow. It runs from a GitHub
# runner (which, unlike a local sandbox, can reach the Supabase Management API)
# using the existing deploy secrets, to inspect and clean up the bogus records
# a test forward to crm@inbound.marketingbende.nl created (contact "Inbound",
# its company, and the "Re: FW: Aanpassingen HuntingXL" deal).
#
# mode=inspect  -> read-only: prints the suspect records + the attachments
#                  bucket privacy flag. Safe to run any time.
# mode=cleanup  -> destructive: requires confirm="DELETE". Deletes the leaked
#                  intake contact and the test deal, then the company ONLY if
#                  it is empty afterwards (a legit company with other data is
#                  protected by that guard). Prints what it deleted.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "inspect (read-only) or cleanup (destructive)"
        required: true
        default: "inspect"
        type: choice
        options:
          - inspect
          - cleanup
      confirm:
        description: 'Type DELETE to confirm a cleanup run'
        required: false
        default: ""

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Run SQL via the Supabase Management API
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query"

          run_sql () {
            local label="$1"; local sql="$2"
            echo "::group::${label}"
            local body
            body=$(jq -nc --arg q "$sql" '{query:$q}')
            curl -sS -X POST "$API" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-raw "$body" | jq .
            echo "::endgroup::"
          }

          echo "Mode: ${{ github.event.inputs.mode }}"

          run_sql "attachments bucket privacy (public should be false)" \
            "select id, public from storage.buckets where id = 'attachments'"

          run_sql "suspect contact (intake address leaked as a contact)" \
            "select id, first_name, last_name, company_id, email_jsonb from contacts where lower(email_jsonb::text) like '%@inbound.marketingbende.nl%' or last_name = 'Inbound'"

          run_sql "suspect deal (the test forward)" \
            "select id, name, company_id, stage, created_at from deals where name ilike 'Re: FW: Aanpassingen HuntingXL%'"

          run_sql "companies named Inbound / Marketingbende / Hunting (with usage counts)" \
            "select c.id, c.name, (select count(*) from contacts x where x.company_id = c.id) as n_contacts, (select count(*) from deals d where d.company_id = c.id) as n_deals from companies c where c.name in ('Inbound','Marketingbende') or c.name ilike '%hunting%' order by c.id"

          if [ "${{ github.event.inputs.mode }}" != "cleanup" ]; then
            echo "Inspect-only run; nothing deleted."
            exit 0
          fi

          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "::error::cleanup mode requires confirm=DELETE; got '${{ github.event.inputs.confirm }}'. Nothing deleted."
            exit 1
          fi

          echo "=== CLEANUP: deleting bogus records ==="

          run_sql "DELETE test deal (notes/tasks cascade)" \
            "delete from deals where name ilike 'Re: FW: Aanpassingen HuntingXL%' returning id, name"

          run_sql "DELETE leaked intake contact (notes/tasks cascade)" \
            "delete from contacts where lower(email_jsonb::text) like '%@inbound.marketingbende.nl%' returning id, first_name, last_name"

          run_sql "DELETE the Marketingbende company ONLY if now empty (guarded)" \
            "delete from companies c where c.name = 'Marketingbende' and not exists (select 1 from contacts x where x.company_id = c.id) and not exists (select 1 from deals d where d.company_id = c.id) returning id, name"

          echo "=== POST-CLEANUP verification ==="
          run_sql "remaining suspects (should be empty)" \
            "select 'contact' as kind, id::text from contacts where lower(email_jsonb::text) like '%@inbound.marketingbende.nl%' union all select 'deal', id::text from deals where name ilike 'Re: FW: Aanpassingen HuntingXL%' union all select 'company', id::text from companies where name = 'Marketingbende'"
